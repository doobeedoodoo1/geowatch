<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#07080d"/>

  <!-- Outer lens ring -->
  <circle cx="256" cy="210" r="118" fill="none" stroke="#00ffb3" stroke-width="14" opacity="0.9"/>
  <!-- Mid lens ring -->
  <circle cx="256" cy="210" r="78" fill="none" stroke="#00ffb3" stroke-width="8" opacity="0.45"/>
  <!-- Inner lens / iris -->
  <circle cx="256" cy="210" r="42" fill="#00ffb3" opacity="0.15"/>
  <circle cx="256" cy="210" r="26" fill="#00ffb3"/>

  <!-- Crosshair top -->
  <line x1="256" y1="60" x2="256" y2="88" stroke="#00ffb3" stroke-width="10" stroke-linecap="round" opacity="0.7"/>
  <!-- Crosshair bottom -->
  <line x1="256" y1="332" x2="256" y2="360" stroke="#00ffb3" stroke-width="10" stroke-linecap="round" opacity="0.7"/>
  <!-- Crosshair left -->
  <line x1="106" y1="210" x2="134" y2="210" stroke="#00ffb3" stroke-width="10" stroke-linecap="round" opacity="0.7"/>
  <!-- Crosshair right -->
  <line x1="378" y1="210" x2="406" y2="210" stroke="#00ffb3" stroke-width="10" stroke-linecap="round" opacity="0.7"/>

  <!-- GEOWATCH text -->
  <text x="256" y="415" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="72" font-weight="900"
        fill="#00ffb3" letter-spacing="6">GEO</text>
  <text x="256" y="470" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="38" font-weight="700"
        fill="#334455" letter-spacing="14">WATCH</text>
</svg>
